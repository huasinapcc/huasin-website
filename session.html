<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>晤談記錄填打工具 — 華昕藝心</title>
<style>
/* ===== 螢幕介面 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: #f0ede8; color: #1a1a1a; padding: 2rem 1rem;
}
.screen-ui { max-width: 820px; margin: 0 auto; }
.page-title { font-size: 14px; color: #888; margin-bottom: 1.25rem; letter-spacing: 0.05em; }
.card {
  background: #fff; border-radius: 10px; border: 1px solid #e0ddd8;
  padding: 1.25rem 1.5rem; margin-bottom: 1rem;
}
.header-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.fg label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; }
.fg input[type="text"] {
  width: 100%; font-size: 14px; font-family: inherit;
  border: 1px solid #ddd; border-radius: 6px; padding: 7px 10px;
  outline: none; background: #fafaf8;
}
.fg input[type="text"]:focus { border-color: #888; background: #fff; }
.col-heads {
  display: grid; grid-template-columns: 220px 1fr 32px;
  padding: 0 0 6px; border-bottom: 1px solid #e8e5e0; margin-bottom: 4px;
}
.th { font-size: 11px; color: #bbb; padding: 0 6px; }
.row-item {
  display: grid; grid-template-columns: 220px 1fr 32px;
  align-items: start; padding: 8px 0; border-bottom: 1px solid #f0ede8;
}
.row-item:last-child { border-bottom: none; }
.rc { padding: 0 6px; }
.rc input[type="number"] {
  width: 44px; font-size: 14px; font-family: inherit;
  border: 1px solid #ddd; border-radius: 6px;
  padding: 6px; text-align: center; outline: none; background: #fafaf8;
}
.rc input[type="number"]:focus { border-color: #888; background: #fff; }
.date-wrap { display: flex; flex-direction: column; gap: 3px; }
.rc input[type="date"] {
  width: 100%; font-size: 13px; font-family: inherit;
  border: 1px solid #ddd; border-radius: 6px; padding: 6px 8px;
  outline: none; background: #fafaf8;
}
.rc input[type="date"]:focus { border-color: #888; background: #fff; }
.roc-lbl { font-size: 11px; color: #aaa; padding: 0 2px; }
.rc textarea {
  width: 100%; font-size: 13.5px; font-family: inherit;
  border: 1px solid #ddd; border-radius: 6px; padding: 6px 8px;
  min-height: 68px; resize: vertical; outline: none; line-height: 1.7;
  background: #fafaf8;
}
.rc textarea:focus { border-color: #888; background: #fff; }
.sig-block { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.sig-line { display: flex; align-items: center; gap: 4px; font-size: 11.5px; color: #999; }
.sig-line input[type="text"] {
  font-size: 12px; font-family: inherit; border: none;
  border-bottom: 1px solid #ccc; outline: none;
  background: transparent; padding: 1px 3px; width: 80px;
}
.sig-line input[type="date"] {
  font-size: 11px; font-family: inherit; border: none;
  border-bottom: 1px solid #ccc; outline: none;
  background: transparent; padding: 1px 2px; width: 130px; border-radius: 0;
}
.sig-roc { font-size: 11px; color: #aaa; }
.del-btn {
  background: none; border: none; cursor: pointer; color: #ccc;
  font-size: 14px; padding: 4px; align-self: center; transition: color 0.15s;
}
.del-btn:hover { color: #e00; }
.add-btn {
  display: flex; align-items: center; gap: 6px; font-size: 13px; color: #aaa;
  cursor: pointer; background: transparent; border: 1px dashed #d0cdc6;
  border-radius: 8px; padding: 8px 14px; width: 100%;
  margin-top: 8px; font-family: inherit; transition: all 0.15s;
}
.add-btn:hover { color: #555; border-color: #999; background: #faf9f6; }
.actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 0.25rem; }
.btn-print {
  display: flex; align-items: center; gap: 6px; padding: 9px 20px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-family: inherit;
}
.btn-print:hover { background: #333; }
.btn-clear {
  display: flex; align-items: center; gap: 6px; padding: 9px 16px;
  font-size: 14px; cursor: pointer; background: transparent; color: #888;
  border: 1px solid #d0cdc6; border-radius: 8px; font-family: inherit;
}
.btn-clear:hover { background: #f5f4f0; }
.btn-preview {
  display: flex; align-items: center; gap: 6px; padding: 9px 16px;
  font-size: 14px; cursor: pointer; background: transparent; color: #555;
  border: 1px solid #aaa; border-radius: 8px; font-family: inherit;
  transition: all 0.15s;
}
.btn-preview:hover { background: #f0ede8; }

/* ===== 列印層 ===== */
.print-layer { display: none; }

@media print {
  @page { size: A4 portrait; margin: 0; }
  body { background: white; padding: 0; margin: 0; }
  .screen-ui { display: none !important; }
  .print-layer {
    display: block !important;
    position: relative;
    width: 21cm;
    height: 29.7cm;
    overflow: hidden;
  }
}

/* 列印層內的定位文字 */
.pf {
  position: absolute;
  font-family: "標楷體", "BiauKai", "DFKai-SB", serif;
  font-size: 11pt;
  color: black;
  white-space: nowrap;
  line-height: 1;
}
.pf-multi {
  position: absolute;
  font-family: "標楷體", "BiauKai", "DFKai-SB", serif;
  font-size: 12pt;
  color: black;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.45;
}
.pf-small {
  position: absolute;
  font-family: "標楷體", "BiauKai", "DFKai-SB", serif;
  font-size: 10pt;
  color: black;
  white-space: nowrap;
  line-height: 1;
}
/* ===== 手機版樣式 ===== */
@media (max-width: 600px) {
  body { padding: 0; background: #f0ede8; }
  .screen-ui { max-width: 100%; }
  .page-title { font-size: 15px; padding: 1rem 1rem 0; margin-bottom: 0.75rem; }
  .hint { padding: 0 1rem; font-size: 13px; margin-bottom: 0.75rem; }

  .card { border-radius: 0; border-left: none; border-right: none; padding: 1rem; margin-bottom: 0.5rem; }

  /* 頂部資訊：改成一欄 */
  .header-grid { grid-template-columns: 1fr; gap: 12px; }
  .fg label { font-size: 13px; margin-bottom: 6px; }
  .fg input[type="text"],
  .fg select { font-size: 16px !important; padding: 10px 12px !important; border-radius: 8px !important; }

  /* 每筆記錄：改成卡片式一欄 */
  .col-heads { display: none; }
  .row-item {
    display: flex; flex-direction: column; gap: 10px;
    padding: 12px 0; border-bottom: 1px solid #e8e5e0;
    background: #fff;
  }
  .rc { padding: 0; }

  /* 次數 + 日期 同一行 */
  .row-item .rc:first-child {
    display: flex; align-items: center; gap: 8px;
  }
  .rc input[type="number"] {
    width: 60px !important; font-size: 16px !important; padding: 10px !important;
    border-radius: 8px !important;
  }
  .rc input[type="date"] {
    font-size: 16px !important; padding: 10px 12px !important;
    border-radius: 8px !important; flex: 1;
  }
  .roc-lbl { font-size: 12px; }

  /* 內容摘要 */
  .rc textarea {
    font-size: 16px !important; padding: 10px 12px !important;
    min-height: 100px; border-radius: 8px !important; line-height: 1.6;
  }

  /* 紀錄者 */
  .sig-block { gap: 8px; }
  .sig-line { font-size: 14px; }
  .sig-line input[type="text"] { font-size: 16px !important; width: 120px; padding: 4px 6px !important; }
  .sig-line input[type="date"] { font-size: 16px !important; width: 100%; padding: 4px 6px !important; }

  /* 刪除按鈕 */
  .del-btn { font-size: 18px; padding: 6px 10px; align-self: flex-end; }

  /* 新增按鈕 */
  .add-btn { font-size: 15px; padding: 12px 16px; margin-top: 4px; border-radius: 10px; }

  /* 字體設定 */
  .card > div[style*="flex"] {
    flex-direction: column !important;
    gap: 12px !important;
  }
  .fg[style*="width:110px"] { width: 100% !important; }
  .fg[style*="min-width:180px"] { min-width: 0 !important; }
  #fontFamily, #fontSize, #lineHeight {
    font-size: 16px !important; padding: 10px 12px !important; border-radius: 8px !important;
    width: 100% !important;
  }

  /* 按鈕區 */
  .actions {
    flex-direction: column; gap: 8px; padding: 1rem;
    position: sticky; bottom: 0; background: #f0ede8;
    border-top: 1px solid #e0ddd8;
  }
  .btn-print, .btn-clear, .btn-preview {
    width: 100%; justify-content: center;
    font-size: 16px !important; padding: 14px !important;
    border-radius: 10px !important;
  }
  .btn-print { order: -1; }

  /* 行次數欄位標籤 */
  .row-num-label { font-size: 12px; color: #aaa; }
}
</style>

function toROC(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');

}

}

  rowCount++;
  const c = document.getElementById('rows');
  const div = document.createElement('div');
  div.className = 'row-item';
  div.innerHTML = `
    <div class="rc rc-num-date" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="row-num-label">第</span>
      <input type="number" min="1" style="width:52px;">
      <span class="row-num-label">次</span>
      <div class="date-wrap" style="flex:1;min-width:140px;">
        <input type="date" onchange="updateDate(this)">
        <span class="roc-lbl" data-roc></span>
      </div>
    </div>
    <div class="rc">
      <textarea placeholder="內容摘要…"></textarea>
      <div class="sig-block">
        <div class="sig-line">紀錄者：<input type="text" placeholder="姓名／蓋章"></div>
        <div class="sig-line">
          <input type="date" onchange="updateSigDate(this)">
          <span class="sig-roc" data-sigroc></span>
        </div>
      </div>
    </div>
    <div class="rc">
      <button class="del-btn" onclick="this.closest('.row-item').remove()" title="刪除">✕</button>
    </div>`;
  c.appendChild(div);
}

function updateDate(inp) {
  inp.closest('.date-wrap').querySelector('[data-roc]').textContent = toROCSlash(inp.value);
}
function updateSigDate(inp) {
  inp.closest('.sig-block').querySelector('[data-sigroc]').textContent = toROC(inp.value);
}

function clearAll() {
  if (!confirm('確定清除所有內容？')) return;
  ['clientName','therapist','licenseNo'].forEach(id => document.getElementById(id).value='');
  document.getElementById('rows').innerHTML='';
  rowCount=0;
  addRow(); addRow(); addRow(); addRow(); addRow();
}

function pxToCm(px) { return px / 96 * 2.54; }

// 用一個固定的 ruler 量 1cm 實際是幾 px（跟瀏覽器一致）
let _cmToPxCache = null;
function cmToPxActual() {
  if (_cmToPxCache) return _cmToPxCache;
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;visibility:hidden;width:1cm;height:1cm;';
  document.body.appendChild(el);
  _cmToPxCache = el.getBoundingClientRect().width;
  document.body.removeChild(el);
  return _cmToPxCache;
}

function measureTextHeight(text, fontFamily, fontSizePt, lineHeight, widthCm) {
  const ruler = document.createElement('div');
  ruler.style.cssText = `position:fixed;visibility:hidden;pointer-events:none;white-space:pre-wrap;word-break:break-all;font-family:${fontFamily};font-size:${fontSizePt}pt;line-height:${lineHeight};width:${widthCm}cm;padding:0;margin:0;border:none;`;
  ruler.textContent = text;
  document.body.appendChild(ruler);
  const h = ruler.getBoundingClientRect().height;
  document.body.removeChild(ruler);
  return h;
}

function fitText(text, fontFamily, fontSize, lineHeight, widthCm, availHcm) {
  const availPx = availHcm * cmToPxActual();
  let lo = 0, hi = text.length;
  while (lo < hi - 1) {
    const mid = Math.floor((lo + hi) / 2);
    const h = measureTextHeight(text.slice(0, mid), fontFamily, fontSize, lineHeight, widthCm);
    if (h <= availPx) lo = mid; else hi = mid;
  }
  return { fitted: text.slice(0, lo), overflow: text.slice(lo) };
}

function buildPrintLayer() {
  const layer = document.getElementById('printLayer');
  layer.innerHTML = '';

  const fontFamily = document.getElementById('fontFamily').value;
  const fontSize   = parseFloat(document.getElementById('fontSize').value) || 12;
  const lineHeight = parseFloat(document.getElementById('lineHeight').value) || 1.45;
  const contentW   = R - D2 - 0.5;

  layer.style.fontFamily = fontFamily;

  function add(cls, x, y, text, w) {
    const el = document.createElement('div');
    el.className = cls;
    el.style.left       = x + 'cm';
    el.style.top        = (y + PRINT_Y_OFFSET) + 'cm';
    el.style.fontFamily = fontFamily;
    el.style.fontSize   = fontSize + 'pt';
    if (cls === 'pf-multi') el.style.lineHeight = String(lineHeight);
    if (w) el.style.width = w + 'cm';
    el.textContent = text;
    layer.appendChild(el);
  }

  function addContent(text, cfg) {
    const el = document.createElement('div');
    el.className = 'pf-multi';
    const contentOffsetY = cfg.contentOffsetY || 0;
    el.style.cssText = `left:${D2+0.30}cm;top:${cfg.contentY-0.25+PRINT_Y_OFFSET+contentOffsetY}cm;width:${contentW}cm;font-family:${fontFamily};font-size:${fontSize}pt;line-height:${lineHeight};`;
    el.textContent = text;
    layer.appendChild(el);
  }

  function contentAvailH(cfg) {
    return cfg.bottomY - cfg.contentY - (cfg.contentOffsetY || 0) - 0.05;
  }

  // 頂部資訊
  const cName = document.getElementById('clientName').value.trim();
  const ther  = document.getElementById('therapist').value.trim();
  const lic   = document.getElementById('licenseNo').value.trim();
  if (cName) add('pf', L+1.0,  HDR_Y, cName);
  if (ther)  add('pf', H1+0.6, HDR_Y, ther);
  if (lic)   add('pf', H2+0.6, HDR_Y, lic);

  const rows = document.querySelectorAll('#rows .row-item');

  // 收集資料
  const rowData = Array.from(rows).map(row => ({
    num:     row.querySelector('input[type=number]').value.trim(),
    dateRoc: row.querySelector('[data-roc]').textContent.trim(),
    content: row.querySelector('textarea').value.trim(),
    sigName: row.querySelector('.sig-line input[type=text]').value.trim(),
    sigRoc:  row.querySelector('[data-sigroc]').textContent.trim(),
  }));

  // 先全部解鎖
  rows.forEach(row => {
    const ta = row.querySelector('textarea');
    ta.disabled = false;
    ta.style.background = '';
    ta.style.color = '';
    const notice = row.querySelector('.overflow-notice');
    if (notice) notice.remove();
  });

  let overflow = '';
  let overflowFrom = -1;
  let pendingSig = null;

  for (let i = 0; i < Math.min(rowData.length, ROWCFG.length); i++) {
    const cfg  = ROWCFG[i];
    const data = rowData[i];
    const availPx = contentAvailH(cfg) * cmToPxActual();

    if (overflow) {
      const row = rows[i];
      if (row) {
        const ta = row.querySelector('textarea');
        ta.disabled = true;
        ta.style.background = '#fdf6ec';
        ta.style.color = '#bbb';
        let notice = row.querySelector('.overflow-notice');
        if (!notice) {
          notice = document.createElement('div');
          notice.className = 'overflow-notice';
          notice.style.cssText = 'font-size:11px;color:#b07020;margin-top:4px;padding:3px 8px;background:#fff8ec;border-radius:4px;border:1px solid #e8d0a0;';
          ta.parentNode.insertBefore(notice, ta);
        }
        notice.textContent = `↑ 第 ${overflowFrom+1} 筆內容延續`;
      }

      const textPx = measureTextHeight(overflow, fontFamily, fontSize, lineHeight, contentW);
      if (textPx <= availPx) {
        addContent(overflow, cfg);
        // 溢出結束，印 sigName/sigRoc 到這格
        if (pendingSig) {
          if (pendingSig.sigName) add('pf-small', SIG_LABEL_X, cfg.sigY, pendingSig.sigName);
          if (pendingSig.sigRoc) {
            const match = pendingSig.sigRoc.match(/(\d+)年(\d+)月(\d+)日/);
            if (match) {
              add('pf-small', SIG_YEAR_X,  cfg.sigY, match[1]);
              add('pf-small', SIG_MONTH_X, cfg.sigY, match[2]);
              add('pf-small', SIG_DAY_X,   cfg.sigY, match[3]);
            }
          }
          pendingSig = null;
        }
        overflow = '';
        overflowFrom = -1;
      } else {
        const cut = fitText(overflow, fontFamily, fontSize, lineHeight, contentW, contentAvailH(cfg));
        addContent(cut.fitted, cfg);
        overflow = cut.overflow;
        // pendingSig 繼續往後帶
      }
      continue;
    }

    if (!data.content) {
      if (data.num)     add('pf',       SESSION_NO_X, cfg.midY-0.2, data.num);
      if (data.dateRoc) add('pf-small', D1+0.10, cfg.midY-0.2, data.dateRoc);
      // 沒有內容，直接印 sigName/sigRoc
      if (data.sigName) add('pf-small', SIG_LABEL_X, cfg.sigY, data.sigName);
      if (data.sigRoc) {
        const match = data.sigRoc.match(/(\d+)年(\d+)月(\d+)日/);
        if (match) {
          add('pf-small', SIG_YEAR_X,  cfg.sigY, match[1]);
          add('pf-small', SIG_MONTH_X, cfg.sigY, match[2]);
          add('pf-small', SIG_DAY_X,   cfg.sigY, match[3]);
        }
      }
      continue;
    }

    // 次數和日期永遠印在自己那格
    if (data.num)     add('pf',       SESSION_NO_X, cfg.midY-0.2, data.num);
    if (data.dateRoc) add('pf-small', D1+0.10, cfg.midY-0.2, data.dateRoc);

    const textPx = measureTextHeight(data.content, fontFamily, fontSize, lineHeight, contentW);
    if (textPx <= availPx) {
      // 不溢出：直接印 sig
      if (data.sigName) add('pf-small', SIG_LABEL_X, cfg.sigY, data.sigName);
      if (data.sigRoc) {
        const match = data.sigRoc.match(/(\d+)年(\d+)月(\d+)日/);
        if (match) {
          add('pf-small', SIG_YEAR_X,  cfg.sigY, match[1]);
          add('pf-small', SIG_MONTH_X, cfg.sigY, match[2]);
          add('pf-small', SIG_DAY_X,   cfg.sigY, match[3]);
        }
      }
      addContent(data.content, cfg);
    } else {
      // 溢出：暫存 sig，等溢出結束的格子再印
      overflow = data.content;
      overflowFrom = i;
      pendingSig = { sigName: data.sigName, sigRoc: data.sigRoc };
      const cut = fitText(data.content, fontFamily, fontSize, lineHeight, contentW, contentAvailH(cfg));
      addContent(cut.fitted, cfg);
      overflow = cut.overflow;
    }
  }
}

function doPreview() {
  buildPrintLayer();

  const content = document.getElementById('previewContent');
  content.innerHTML = '';
  content.style.cssText = 'position:relative;width:21cm;height:29.7cm;background:white;box-shadow:0 4px 24px rgba(0,0,0,0.3);overflow:hidden;';

  // 表格圖疊底（半透明）
  const tableImg = document.createElement('img');
  tableImg.src = TABLE_IMG;
  tableImg.style.cssText = 'position:absolute;top:0;left:0;width:21cm;height:29.7cm;opacity:0.4;pointer-events:none;z-index:1;';
  content.appendChild(tableImg);

  // 把 printLayer 的每個子元素複製進來（保留 inline style，座標完全一致）
  const layer = document.getElementById('printLayer');
  layer.childNodes.forEach(node => {
    const clone = node.cloneNode(true);
    if (clone.style) clone.style.zIndex = '2';
    content.appendChild(clone);
  });

  document.getElementById('previewModal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closePreview() {
  document.getElementById('previewModal').style.display = 'none';
  document.body.style.overflow = '';
}

function doPrint() {
  buildPrintLayer();
  window.print();
}

addRow(); addRow(); addRow(); addRow(); addRow();
</script>
